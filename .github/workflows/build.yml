name: unit tests
on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: git clone
        uses: actions/checkout@v6

      - name: set up go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.x

      - name: go build
        run: go build -v

      - name: go test
        run: go test -v -cover -coverpkg=./... -race ./...
